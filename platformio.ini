; ══════════════════════════════════════════════════════════════════════════════
; RPICT Universal Monitor – PlatformIO Konfiguration
; Boards: ESP32 | ESP32-C3 | ESP8266
; ══════════════════════════════════════════════════════════════════════════════

[common]
monitor_speed = 115200
lib_deps =
  knolleary/PubSubClient @ ^2.8
  bblanchon/ArduinoJson  @ ^6.21

; ══════════════════════════════════════════════════════════════════════════════
; Original ESP32  (WROOM-32, WROVER, DevKit v1, …)
;   Standard RX-Pin: GPIO 16  (in App konfigurierbar)
; ══════════════════════════════════════════════════════════════════════════════
[env:esp32]
platform               = espressif32
board                  = esp32dev
framework              = arduino
monitor_speed          = ${common.monitor_speed}
lib_deps               = ${common.lib_deps}
board_build.partitions = min_spiffs.csv
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_ESP32

; ══════════════════════════════════════════════════════════════════════════════
; ESP32-C3  (DevKitM-1, SuperMini, …)
;   RISC-V Kern, UART1 fuer RPICT – Standard RX-Pin: GPIO 4
;
;   WICHTIG: Kein ARDUINO_USB_CDC_ON_BOOT hier!
;   Das Flag remappt Serial->USBSerial im gesamten Framework (inkl.
;   chip-debug-report.cpp) und bricht den Build.
;   Flash stattdessen ueber UART0 (USB-zu-Serial Adapter) oder
;   waehle das Board "esp32-c3-devkitc-02" fuer native USB-Upload.
; ══════════════════════════════════════════════════════════════════════════════
[env:esp32c3]
platform               = espressif32
board                  = esp32-c3-devkitm-1
framework              = arduino
monitor_speed          = ${common.monitor_speed}
lib_deps               = ${common.lib_deps}
board_build.partitions = min_spiffs.csv
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_ESP32_C3

; ══════════════════════════════════════════════════════════════════════════════
; ESP32-C3 SuperMini / native USB-Upload (alternative Umgebung)
;   Verwendet esp32-c3-devkitc-02 Board-Definition die USB-CDC korrekt
;   unterstuetzt ohne den Serial-Makro-Konflikt.
; ══════════════════════════════════════════════════════════════════════════════
[env:esp32c3_usb]
platform               = espressif32
board                  = esp32-c3-devkitc-02
framework              = arduino
monitor_speed          = ${common.monitor_speed}
lib_deps               = ${common.lib_deps}
board_build.partitions = min_spiffs.csv
upload_protocol        = esp-builtin
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DBOARD_ESP32_C3

; ══════════════════════════════════════════════════════════════════════════════
; ESP8266  (NodeMCU v2/v3, Wemos D1 Mini, …)
;   SoftwareSerial fuer RPICT – Standard RX-Pin: D5=GPIO14
; ══════════════════════════════════════════════════════════════════════════════
[env:esp8266]
platform      = espressif8266
board         = d1_mini
framework     = arduino
monitor_speed = ${common.monitor_speed}
lib_deps =
  ${common.lib_deps}
  plerup/EspSoftwareSerial @ ^8.1
build_flags =
  -DBOARD_ESP8266
  -DPIO_FRAMEWORK_ARDUINO_LWIP2_LOW_MEMORY
